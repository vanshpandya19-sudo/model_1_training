<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Animated Box</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0f172a;
  }

  .box {
    width: 80px;
    height: 80px;
    background: linear-gradient(45deg, #ff4d4d, #4dd2ff, #7cff4d);
    position: absolute;
    border-radius: 12px;
    animation: moveRotateScale 6s infinite linear;
  }

  @keyframes moveRotateScale {
    0% {
      transform: translate(0, 0) scale(1) rotate(0deg);
    }
    25% {
      transform: translate(calc(100vw - 80px), 0) scale(1.5) rotate(90deg);
    }
    50% {
      transform: translate(calc(100vw - 80px), calc(100vh - 80px)) scale(0.7) rotate(180deg);
    }
    75% {
      transform: translate(0, calc(100vh - 80px)) scale(1.3) rotate(270deg);
    }
    100% {
      transform: translate(0, 0) scale(1) rotate(360deg);
    }
  }
</style>
</head>

<body>
  <div class="box"></div>
</body>
</html>
