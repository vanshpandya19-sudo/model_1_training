<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Invitation</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Card */
#card {
    width: 450px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    overflow: hidden;
}

/* Header */
.header {
    background: #ff4081;
    color: white;
    text-align: center;
    padding: 15px;
}

/* Content spacing */
.section {
    padding: 15px;
    text-align: center;
}

/* Image */
img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* Video */
video {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

/* Audio */
audio {
    width: 100%;
    margin-top: 10px;
}

/* Map */
.map {
    margin-top: 10px;
    border-radius: 10px;
    overflow: hidden;
}

.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background: #ff4081;
    color: white;
    border-radius: 30px;
    text-decoration: none;
}

.btn:hover {
    background: #e91e63;
}

</style>
</head>

<body>

<div id="card">

    <!-- Header -->
    <div class="header">
        <h1>🎉 Birthday Invitation 🎉</h1>
        <p>You are Invited!</p>
    </div>

    <!-- IMAGE -->
    <div class="section">
        <img src="https://images.unsplash.com/photo-1530103862676-de8c9debad1d" alt="Birthday Cake">
    </div>

    <!-- DETAILS -->
    <div class="section">
        <h2>Rahul's Birthday Party</h2>
        <p>📅 5 May 2026 | ⏰ 7:00 PM</p>
        <p>📍 comfy restruent, Ahmedabad</p>
    </div>

    <!-- VIDEO -->
    <div class="section">
        <h3>🎥 Party Preview</h3>
        <video controls>
            <source src="8015371-hd_1080_1920_25fps.mp4" type="video/mp4">
            Your browser does not support video.
        </video>
    </div>

    <!-- AUDIO -->
    <div class="section">
        <h3>🎵 Birthday Music</h3>
        <audio controls>
            <source src="nastelbom-happy-birthday-495860.mp3" type="audio/mp3">
            Your browser does not support audio.
        </audio>
    </div>

    <!-- MAP -->
    <div class="section">
        <h3>📍 Location Map</h3>
        <div class="map">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3673.228119292847!2d72.60603307476902!3d22.9786375179674!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e85f937bcf3bd%3A0x65578de0134c1672!2sComfy%20Restaurant!5e0!3m2!1sen!2sin!4v1778664888421!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </div>

    <!-- BUTTON -->
    <div class="section">
        <a href="#" class="btn">RSVP Now</a>
    </div>

</div>

</body>
</html>
