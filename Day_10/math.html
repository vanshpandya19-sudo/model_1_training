<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Math Methods</title>
</head>
<body>

    <h2>JavaScript Math Methods Example</h2>

    <script>
        let x = -25;
        let a = 5;
        let b = 2;

        document.write("Absolute Value: " + Math.abs(x) + "<br>");
        document.write("Sine Value: " + Math.sin(a) + "<br>");
        document.write("Cosine Value: " + Math.cos(a) + "<br>");
        document.write("Tan Value: " + Math.tan(a) + "<br>");

        document.write("Arc Cosine: " + Math.acos(0.5) + "<br>");
        document.write("Arc Sine: " + Math.asin(0.5) + "<br>");
        document.write("Arc Tangent: " + Math.atan(1) + "<br>");
        document.write("Atan2 Value: " + Math.atan2(10, 5) + "<br>");

        document.write("Random Number: " + Math.random() + "<br>");

        document.write("Exponential Value: " + Math.exp(2) + "<br>");
        document.write("Ceil Value: " + Math.ceil(4.2) + "<br>");
        document.write("Floor Value: " + Math.floor(4.9) + "<br>");

        document.write("Log Value: " + Math.log(10) + "<br>");
        document.write("Round Value: " + Math.round(4.6) + "<br>");

        document.write("Power Value: " + Math.pow(a, b) + "<br>");
        document.write("Maximum Value: " + Math.max(10, 20, 30, 40) + "<br>");

        document.write("Square Root: " + Math.sqrt(64) + "<br>");
    </script>

</body>
</html>
