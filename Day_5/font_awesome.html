<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Font Awesome Practical</title>

  <!-- Font Awesome CDN -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#4facfe,#00f2fe);
    }

    .card{
      width:320px;
      background:white;
      border-radius:20px;
      padding:30px;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-10px);
    }

    .profile-img{
      width:120px;
      height:120px;
      border-radius:50%;
      border:5px solid #4facfe;
      object-fit:cover;
    }

    h2{
      margin-top:15px;
      color:#333;
    }

    p{
      color:gray;
      margin:10px 0 20px;
    }

    .social-icons a{
      text-decoration:none;
      color:white;
      margin:0 8px;
      width:45px;
      height:45px;
      display:inline-flex;
      justify-content:center;
      align-items:center;
      border-radius:50%;
      transition:0.3s;
      font-size:20px;
    }

    .facebook{
      background:#1877f2;
    }

    .instagram{
      background:#e4405f;
    }

    .twitter{
      background:#1da1f2;
    }

    .linkedin{
      background:#0077b5;
    }

    .social-icons a:hover{
      transform:scale(1.2);
    }

    .btn{
      display:inline-block;
      margin-top:20px;
      padding:12px 25px;
      background:#4facfe;
      color:white;
      text-decoration:none;
      border-radius:30px;
      transition:0.3s;
    }

    .btn:hover{
      background:#008cff;
    }
  </style>
</head>
<body>

  <div class="card">
    
    <img src="https://i.pravatar.cc/150?img=12" class="profile-img">

    <h2>John Doe</h2>
    <p>Frontend Developer</p>

    <div class="social-icons">
      <a href="#" class="facebook">
        <i class="fab fa-facebook-f"></i>
      </a>

      <a href="#" class="instagram">
        <i class="fab fa-instagram"></i>
      </a>

      <a href="#" class="twitter">
        <i class="fab fa-twitter"></i>
      </a>

      <a href="#" class="linkedin">
        <i class="fab fa-linkedin-in"></i>
      </a>
    </div>

    <a href="#" class="btn">
      <i class="fa-solid fa-user-plus"></i> Follow
    </a>

  </div>

</body>
</html>
