<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Positioning Effect</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#111;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      position:relative;
      width:800px;
      height:450px;
      overflow:hidden;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.5);
    }

    /* Video Styling */
    .container video{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    /* Text Positioned on Video */
    .content{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      text-align:center;
      color:white;
      background:rgba(0,0,0,0.5);
      padding:20px 40px;
      border-radius:10px;
    }

    .content h1{
      font-size:40px;
      margin-bottom:10px;
    }

    .content p{
      font-size:18px;
    }

    /* Hover Effect */
    .container:hover .content{
      background:rgba(255,0,0,0.7);
      transition:0.5s;
    }

    .container:hover video{
      transform:scale(1.05);
      transition:0.5s;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Video -->
    <video autoplay muted loop>
      <source src="26ss_sp_select_homura_16x9_3840oceuoce2160_17s.mp4" type="video/mp4">
      Your browser does not support video.
    </video>

    <!-- Positioned Content -->
    <div class="content">
      <h1>puma </h1>
      <p></p>
    </div>

  </div>

</body>
</html>
