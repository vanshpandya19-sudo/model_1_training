<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Chess Tic Tac Toe</title>

<style>

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  body{
    background:linear-gradient(135deg,#0f172a,#111827);
    color:white;
    font-family:Arial, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .game-container{
    text-align:center;
  }

  h1{
    margin-bottom:20px;
    color:#facc15;
    font-size:40px;
  }

  .board{
    display:grid;
    grid-template-columns:repeat(3,120px);
    gap:12px;
    justify-content:center;
  }

  .cell{
    width:120px;
    height:120px;
    background:#1e293b;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:65px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
  }

  .cell:hover{
    background:#334155;
    transform:scale(1.05);
  }

  #status{
    margin-top:25px;
    font-size:28px;
    color:#38bdf8;
    min-height:40px;
  }

  button{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
  }

  button:hover{
    background:#16a34a;
    transform:scale(1.05);
  }

  .winner{
    background:#f59e0b !important;
    color:black;
    animation:glow 1s infinite alternate;
  }

  @keyframes glow{
    from{
      box-shadow:0 0 10px #facc15;
    }
    to{
      box-shadow:0 0 25px #facc15;
    }
  }

</style>
</head>

<body>

<div class="game-container">

  <h1>♔ Chess Tic Tac Toe ♛</h1>

  <div class="board" id="board">

    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>

    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>

    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>

  </div>

  <div id="status">♔ King Turn</div>

  <button onclick="restartGame()">Restart Game</button>

</div>

<script>

  const cells = document.querySelectorAll(".cell");
  const statusText = document.getElementById("status");

  let currentPlayer = "king";
  let gameActive = true;

  const king = "♔";
  const queen = "♛";

  const winningConditions = [
    [0,1,2],
    [3,4,5],
    [6,7,8],
    [0,3,6],
    [1,4,7],
    [2,5,8],
    [0,4,8],
    [2,4,6]
  ];

  cells.forEach(cell => {
    cell.addEventListener("click", cellClick);
  });

  function cellClick(){

    if(this.textContent !== "" || !gameActive){
      return;
    }

    this.textContent = currentPlayer === "king" ? king : queen;

    checkWinner();

    if(!gameActive){
      return;
    }

    currentPlayer = currentPlayer === "king" ? "queen" : "king";

    statusText.textContent =
      currentPlayer === "king"
      ? "♔ King Turn"
      : "♛ Queen Turn";
  }

  function checkWinner(){

    let won = false;

    winningConditions.forEach(condition => {

      const a = cells[condition[0]].textContent;
      const b = cells[condition[1]].textContent;
      const c = cells[condition[2]].textContent;

      if(a === "" || b === "" || c === ""){
        return;
      }

      if(a === b && b === c){

        won = true;

        cells[condition[0]].classList.add("winner");
        cells[condition[1]].classList.add("winner");
        cells[condition[2]].classList.add("winner");

      }

    });

    if(won){

      statusText.textContent =
        currentPlayer === "king"
        ? "🎉 King Wins!"
        : "🎉 Queen Wins!";

      gameActive = false;
      return;
    }

    let draw = true;

    cells.forEach(cell => {
      if(cell.textContent === ""){
        draw = false;
      }
    });

    if(draw){
      statusText.textContent = "🤝 Match Draw!";
      gameActive = false;
    }

  }

  function restartGame(){

    cells.forEach(cell => {
      cell.textContent = "";
      cell.classList.remove("winner");
    });

    currentPlayer = "king";
    gameActive = true;

    statusText.textContent = "♔ King Turn";
  }

</script>

</body>
</html>
