<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gaming Hub</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
      min-height:100vh;
    }

    header{
      text-align:center;
      padding:30px;
      font-size:40px;
      font-weight:bold;
      color:#38bdf8;
    }

    .container{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:40px;
      flex-wrap:wrap;
      padding:50px;
    }

    .card{
      width:300px;
      background:#1e293b;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
      transition:0.3s;
      text-align:center;
      padding-bottom:20px;
    }

    .card:hover{
      transform:translateY(-10px);
      box-shadow:0 0 30px #38bdf8;
    }

    .card img{
      width:100%;
      height:200px;
      object-fit:cover;
    }

    .card h2{
      margin:20px 0 10px;
      color:#38bdf8;
    }

    .card p{
      padding:0 20px;
      margin-bottom:20px;
      color:#cbd5e1;
    }

    .btn{
      display:inline-block;
      padding:12px 25px;
      background:#38bdf8;
      color:white;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      background:#0ea5e9;
    }

    footer{
      text-align:center;
      padding:20px;
      color:#94a3b8;
    }
  </style>
</head>

<body>

  <header>
    🎮 Gaming Hub
  </header>

  <div class="container">

    <!-- Chess Card -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1586165368502-1bad197a6461?q=80&w=1200&auto=format&fit=crop" alt="Chess Game">

      <h2>Chess Game</h2>

      <p>
        Play the classic strategy chess game and challenge your brain.
      </p>

      <a href="chess.html" class="btn">Play Chess</a>
    </div>

    <!-- Tic Tac Toe Card -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1611996575749-79a3a250f948?q=80&w=1200&auto=format&fit=crop" alt="Tic Tac Toe">

      <h2>Tic Tac Toe</h2>

      <p>
        Enjoy the fun Tic Tac Toe game with your friends.
      </p>

      <a href="tictacgame.html" class="btn">Play Tic Tac Toe</a>
    </div>

  </div>

  <footer>
    Made with ❤️ for Gamers
  </footer>

</body>
</html>
