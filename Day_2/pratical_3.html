<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advertisement Page</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #ff4d4d;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .section {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    img {
      width: 50%;
      border-radius: 10px;
    }

    video, audio, iframe {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #222;
      color: white;
    }
  </style>
</head>

<body>

<header>
  🚀 Big Sale Advertisement 🚀
</header>

<div class="container">

  <!-- Image Section -->
  <div class="section">
    <h2>Featured Product</h2>
    <img src="puma-forever-faster-brand-campaign-mondo-duplantis.jpg" alt="Ad Image">
    <p>Get the best deals today! Limited time offer.</p>
  </div>

  <!-- Audio Section -->
  <div class="section">
    <h2>Listen to Our Offer</h2>
    <audio controls>
      <source src="Puma Roar - QuickSounds.com.mp3" type="audio/mpeg">
      Your browser does not support audio.
    </audio>
  </div>

  <!-- Video Section -->
  <div class="section">
    <h2>Watch Our Advertisement</h2>
    <video controls>
      <source src="26ss_sp_select_homura_16x9_3840oceuoce2160_17s.mp4" type="video/mp4">
      Your browser does not support video.
    </video>
  </div>

  <!-- Google Map Section -->
  <div class="section">
    <h2>Visit Our Store Location</h2>
    
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d38212.74688982985!2d72.48061189201053!3d23.016444574126712!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e84f3bcd063b7%3A0x74e9f9a909c7528c!2sPUMA%20Store!5e0!3m2!1sen!2sin!4v1778579092937!5m2!1sen!2sin" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
  </div>

</div>

<footer>
  © 2026 Your Brand | All Rights Reserved
</footer>

</body>
</html>
