<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silver Oak University Registration</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background-color:#f4f6f9;
        }

        /* HEADER */

        header{
            background-color:#002147;
            color:white;
            padding:15px 40px;
        }

        .header-container{
            display:flex;
            align-items:center;
            justify-content:space-between;
        }

        .logo-section{
            display:flex;
            align-items:center;
        }

        .logo-section img{
            width:70px;
            height:70px;
            margin-right:15px;
        }

        .logo-section h1{
            font-size:28px;
        }

        /* NAVBAR */

        nav{
            background-color:#013a75;
            padding:12px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:0 20px;
            font-size:17px;
        }

        nav a:hover{
            color:#ffcc00;
        }

        /* FORM CONTAINER */

        .container{
            width:50%;
            margin:40px auto;
            background-color:white;
            padding:35px;
            border-radius:8px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .container h2{
            text-align:center;
            margin-bottom:30px;
            color:#002147;
        }

        /* FORM */

        form label{
            display:block;
            margin-top:15px;
            margin-bottom:7px;
            font-weight:bold;
            color:#333;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        textarea{
            resize:none;
        }

        /* RADIO */

        .gender{
            margin-top:10px;
        }

        .gender input{
            width:auto;
            margin-right:5px;
        }

        /* BUTTONS */

        .button-group{
            margin-top:25px;
            display:flex;
            gap:15px;
        }

        button{
            flex:1;
            padding:12px;
            border:none;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
        }

        .submit-btn{
            background-color:#002147;
            color:white;
        }

        .submit-btn:hover{
            background-color:#013a75;
        }

        .reset-btn{
            background-color:#999;
            color:white;
        }

        .reset-btn:hover{
            background-color:#777;
        }

        /* FOOTER */

        footer{
            margin-top:40px;
            background-color:#002147;
            color:white;
            text-align:center;
            padding:18px;
        }

        footer a{
            color:#ffcc00;
            text-decoration:none;
        }

        footer a:hover{
            text-decoration:underline;
        }

        /* MOBILE */

        @media(max-width:768px){

            .container{
                width:90%;
            }

            .header-container{
                flex-direction:column;
                text-align:center;
            }

            nav a{
                display:block;
                margin:10px 0;
            }

            .button-group{
                flex-direction:column;
            }
        }

    </style>
</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="header-container">

            <div class="logo-section">

                <img src="silver-oak-university-logo.jpg" alt="University Logo">

                <h1>Silver Oak University</h1>

            </div>

        </div>

    </header>

    <!-- NAVBAR -->

    <nav>

        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Sign Up</a>
        <a href="#">Login</a>
        <a href="#">Contact</a>

    </nav>

    <!-- FORM -->

    <div class="container">

        <h2>Student Registration Form</h2>

        <form>

            <label>Student Name</label>
            <input type="text" placeholder="Enter your name" required>

            <label>Enrollment Number</label>
            <input type="text" placeholder="Enter enrollment number" required>

            <label>Branch</label>

            <select required>

                <option value="">-- Select Branch --</option>
                <option>Computer Engineering</option>
                <option>Information Technology</option>
                <option>Mechanical Engineering</option>
                <option>Civil Engineering</option>
                <option>Electrical Engineering</option>

            </select>

            <label>Division</label>

            <select required>

                <option value="">-- Select Division --</option>
                <option>A</option>
                <option>B</option>
                <option>C</option>
                <option>D</option>

            </select>

            <label>Gender</label>

            <div class="gender">

                <input type="radio" name="gender"> Male

                <input type="radio" name="gender"> Female

                <input type="radio" name="gender"> Other

            </div>

            <label>Mobile Number</label>
            <input type="tel" placeholder="Enter mobile number" required>

            <label>Email</label>
            <input type="email" placeholder="Enter email address" required>

            <label>Password</label>
            <input type="password" placeholder="Enter password" required>

            <label>Upload Photo</label>
            <input type="file">

            <label>Remark</label>
            <textarea rows="4" placeholder="Enter remarks"></textarea>

            <div class="button-group">

                <button type="submit" class="submit-btn">
                    Submit
                </button>

                <button type="reset" class="reset-btn">
                    Clear
                </button>

            </div>

        </form>

    </div>

    <!-- FOOTER -->

    <footer>

        © 2026 Silver Oak University |
        <a href="https://silveroakuni.ac.in/" target="_blank">
            Official Website
        </a>

    </footer>

</body>

</html>
