<!DOCTYPE html>
<html>
<head>
    <title>Remove Specific Row</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        table {
            width: 70%;
            border-collapse: collapse;
            margin: 20px auto;
        }
        th{
            background-color: aqua;
        }
        th, td {
            border: 2px solid black;
            padding: 10px;
            text-align: center;
        }

        button {
            padding: 5px 10px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<table id="studentTable">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Action</th>
    </tr>

    <tr>
        <td>1</td>
        <td>Ravi</td>
        <td><button class="deleteRow">Delete</button></td>
    </tr>

    <tr>
        <td>2</td>
        <td>Raju</td>
        <td><button class="deleteRow">Delete</button></td>
    </tr>

    <tr>
        <td>3</td>
        <td>Babu</td>
        <td><button class="deleteRow">Delete</button></td>
    </tr>
    <tr>
        <td>4</td>
        <td>Vipin</td>
        <td><button class="deleteRow">Delete</button></td>
    </tr>
    <tr>
        <td>5</td>
        <td>Baki</td>
        <td><button class="deleteRow">Delete</button></td>
    </tr>
</table>

<script>
$(document).ready(function(){

    $(".deleteRow").click(function(){

        $(this).closest("tr").remove();

    });

});
</script>

</body>
</html>
