<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop-up</title>
</head>
<body>
    <script>
        var a = prompt("Enter Name");
        alert("User Entered " + a);
        a = confirm("Are you sure??");
        if (a == true) {
            alert("Record Deleted");
        } 
        else {
            alert("Record Not Deleted");
        }
    </script>
</body>
</html>
